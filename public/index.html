<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>運営課 統合売上ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root{color-scheme:light}
*{box-sizing:border-box}
body{margin:0;background:#f4f6f9;color:#1f2933;font-family:"Segoe UI","Meiryo",sans-serif}
.topbar{background:#1F4E78;color:#fff;padding:16px 24px}
.topbar h1{font-size:19px;margin:0}
.topbar .sub{font-size:11px;color:#c9dcef;margin-top:2px}
.tabs{display:flex;gap:2px;background:#163a5c;padding:0 20px;overflow-x:auto}
.tab{background:transparent;border:none;color:#c9dcef;padding:11px 18px;font-size:13px;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
.tab.active{color:#fff;border-bottom-color:#e8873a;font-weight:600}
.tab:disabled{color:#5f7c98;cursor:not-allowed}
.content{padding:20px;max-width:1100px;margin:0 auto}
.panel{display:none}
.panel.active{display:block}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;background:#fff;border:1px solid #e3e8ee;border-radius:10px;padding:12px 14px}
.toolbar label{font-size:12px;color:#67727e}
.toolbar input[type=date]{border:1px solid #d5dce3;border-radius:6px;padding:5px 8px;font-size:13px}
.toolbar .spacer{flex:1}
.btn{background:#1F4E78;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;cursor:pointer}
.btn:hover{background:#173d61}
.btn.secondary{background:#fff;color:#1F4E78;border:1px solid #1F4E78}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:18px}
.card{background:#fff;border:1px solid #e3e8ee;border-radius:10px;padding:14px 16px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.card .l{font-size:12px;color:#67727e;margin-bottom:6px}
.card .v{font-size:22px;font-weight:700}
.card .u{font-size:12px;color:#8a95a1;margin-left:3px}
.card.key{background:#eef5fc;border-color:#c9dcf0}
.card.key .v{color:#1F4E78}
.wrap{background:#fff;border:1px solid #e3e8ee;border-radius:10px;padding:16px;margin-bottom:20px}
.wrap h3{font-size:13px;margin:0 0 12px;color:#67727e;font-weight:600}
.chartbox{height:260px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:7px 10px;border-bottom:1px solid #eef1f5;text-align:right}
th{background:#1F4E78;color:#fff;font-weight:600;position:sticky;top:0}
th:first-child,td:first-child{text-align:left}
tbody tr:hover{background:#f7fafd}
tfoot td{font-weight:700;background:#eef5fc}
.scroll{max-height:320px;overflow:auto;border:1px solid #eef1f5;border-radius:8px}
.note{font-size:11px;color:#8a95a1;margin-top:8px}
.empty{color:#8a95a1;font-size:13px;padding:30px;text-align:center}
</style><style>
#authOverlay{position:fixed;inset:0;background:#f4f6f9;z-index:9999;display:flex;
  align-items:center;justify-content:center;font-family:"Segoe UI","Meiryo",sans-serif}
#authBox{background:#fff;border:1px solid #e3e8ee;border-radius:12px;padding:32px 28px;
  width:320px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
#authBox h2{margin:0 0 4px;font-size:18px;color:#1F4E78}
#authBox p{margin:0 0 18px;font-size:12px;color:#67727e}
#authBox input{width:100%;box-sizing:border-box;padding:9px 10px;margin-bottom:10px;
  border:1px solid #d5dce3;border-radius:6px;font-size:14px}
#authBox button{width:100%;padding:10px;background:#1F4E78;color:#fff;border:none;
  border-radius:6px;font-size:14px;cursor:pointer}
#authBox button:hover{background:#173d61}
#authErr{color:#c0392b;font-size:12px;min-height:16px;margin-bottom:6px}
#logoutBar{position:fixed;top:8px;right:12px;z-index:9998;font-size:12px;color:#67727e}
#logoutBar button{margin-left:8px;background:none;border:1px solid #d5dce3;border-radius:6px;
  padding:4px 10px;cursor:pointer;font-size:12px;color:#1F4E78}
</style></head>
<body>
<div id="authOverlay">
  <div id="authBox">
    <h2>運営課ダッシュボード</h2>

    <div id="authErr"></div>
    <input id="authEmail" type="email" placeholder="メールアドレス" autocomplete="username">
    <input id="authPass" type="password" placeholder="パスワード" autocomplete="current-password">

<div id="logoutBar" style="display:none">

</div>
<div id="appRoot" style="display:none">
<div class="topbar">

  <div class="sub">最終更新: <span id="updated"></span></div>
</div>
<div class="tabs" id="tabs"></div>
<div class="content" id="content"></div>

<script>
const DATA = {"updated": "2026-07-10 09:13", "unei": {"daily": [{"date": "2026-07-01", "tier": 6718, "aki": 2846, "torihiki": 9630580, "tesuryo": 886559, "ken": 150, "cat_portal": 0, "cat_mail": 0, "cat_index": 0, "cat_college": 0, "cat_sales": 0, "cat_other": 2846}, {"date": "2026-07-02", "tier": 5862, "aki": 17275, "torihiki": 4936179, "tesuryo": 409977, "ken": 105, "cat_portal": 0, "cat_mail": 0, "cat_index": 0, "cat_college": 0, "cat_sales": 0, "cat_other": 17275}, {"date": "2026-07-03", "tier": 6240, "aki": 4551, "torihiki": 7162496, "tesuryo": 613843, "ken": 133, "cat_portal": 0, "cat_mail": 0, "cat_index": 0, "cat_college": 0, "cat_sales": 0, "cat_other": 4551}, {"date": "2026-07-04", "tier": 1713, "aki": 2, "torihiki": 2397498, "tesuryo": 257242, "ken": 53, "cat_portal": 0, "cat_mail": 0, "cat_index": 0, "cat_college": 0, "cat_sales": 0, "cat_other": 2}, {"date": "2026-07-05", "tier": 3953, "aki": 19091, "torihiki": 1120478, "tesuryo": 126803, "ken": 58, "cat_portal": 0, "cat_mail": 0, "cat_index": 0, "cat_college": 0, "cat_sales": 0, "cat_other": 19091}, {"date": "2026-07-06", "tier": 4837, "aki": 6968, "torihiki": 11379194, "tesuryo": 989476, "ken": 164, "cat_portal": 0, "cat_mail": 0, "cat_index": 0, "cat_college": 0, "cat_sales": 0, "cat_other": 6968}, {"date": "2026-07-07", "tier": 3843, "aki": 1186, "torihiki": 6093640, "tesuryo": 563459, "ken": 110, "cat_portal": 0, "cat_mail": 0, "cat_index": 0, "cat_college": 0, "cat_sales": 0, "cat_other": 1186}, {"date": "2026-07-08", "tier": 3425, "aki": 4456, "torihiki": 22541494, "tesuryo": 2016925, "ken": 172, "cat_portal": 0, "cat_mail": 0, "cat_index": 0, "cat_college": 0, "cat_sales": 0, "cat_other": 4456}, {"date": "2026-07-09", "tier": 5947, "aki": 4, "torihiki": 18791174, "tesuryo": 1757561, "ken": 166, "cat_portal": 0, "cat_mail": 0, "cat_index": 0, "cat_college": 0, "cat_sales": 0, "cat_other": 4}, {"date": "2026-07-10", "tier": 218, "aki": 0, "torihiki": 988050, "tesuryo": 103988, "ken": 12, "cat_portal": 0, "cat_mail": 0, "cat_index": 0, "cat_college": 0, "cat_sales": 0, "cat_other": 0}]}, "adsense": {"period": "2026-07-08", "fetched_at": null, "total": 56719, "total_approx": true, "english_for_japanese": 132, "today": null, "yesterday": null, "mtd": null, "balance": null, "note": "1行が省略されたプレビューのため合計(すべて)は概算。添付レポート未取得。", "sites": {"www.infotop.jp": 56533, "english-for-japanese.net": 132, "penguin-tools.com": 54, "www0.infotop.jp": 0, "release.infotop.jp": 0}}, "kaijudo": {"daily": [{"date": "2026-07-07", "sales": 1200, "receive": 997, "orders": 3}]}, "rokt": {"daily": [{"Date": "2026-07-01", "Revenue": 1307.11, "Value": 1307.11, "Transactions": 50.0, "RPT": 26.14, "VPT": 26.14, "Layout Impressions": 49.0, "RPM": 26675.65, "Offer Impressions": 114.0, "Referrals": 6.0}, {"Date": "2026-07-02", "Revenue": 1191.93, "Value": 1191.93, "Transactions": 24.0, "RPT": 49.66, "VPT": 49.66, "Layout Impressions": 21.0, "RPM": 56758.62, "Offer Impressions": 46.0, "Referrals": 5.0}, {"Date": "2026-07-03", "Revenue": 3326.51, "Value": 3326.51, "Transactions": 34.0, "RPT": 97.84, "VPT": 97.84, "Layout Impressions": 32.0, "RPM": 103953.53, "Offer Impressions": 72.0, "Referrals": 8.0}, {"Date": "2026-07-04", "Revenue": 733.77, "Value": 733.77, "Transactions": 18.0, "RPT": 40.77, "VPT": 40.77, "Layout Impressions": 18.0, "RPM": 40765.18, "Offer Impressions": 47.0, "Referrals": 6.0}, {"Date": "2026-07-05", "Revenue": 781.04, "Value": 781.04, "Transactions": 22.0, "RPT": 35.5, "VPT": 35.5, "Layout Impressions": 19.0, "RPM": 41107.37, "Offer Impressions": 50.0, "Referrals": 4.0}, {"Date": "2026-07-06", "Revenue": 837.41, "Value": 837.41, "Transactions": 34.0, "RPT": 24.63, "VPT": 24.63, "Layout Impressions": 34.0, "RPM": 24629.56, "Offer Impressions": 70.0, "Referrals": 5.0}, {"Date": "2026-07-07", "Revenue": 270.92, "Value": 270.92, "Transactions": 28.0, "RPT": 9.68, "VPT": 9.68, "Layout Impressions": 25.0, "RPM": 10836.6, "Offer Impressions": 62.0, "Referrals": 3.0}], "columns": ["Date", "Revenue", "Value", "Transactions", "RPT", "VPT", "Layout Impressions", "RPM", "Offer Impressions", "Referrals"], "date_col": "Date"}};
const yen = n => "¥" + Math.round(n||0).toLocaleString("ja-JP");
document.getElementById("updated").textContent = DATA.updated;

const SOURCES = [
  {key:"overview", label:"概要"},
  {key:"unei", label:"インフォトップ"},
  {key:"adsense", label:"AdSense"},
  {key:"kaijudo", label:"海獣堂"},
  {key:"rokt", label:"Rokt"},
];

function within(dateStr, from, to){
  if(from && dateStr < from) return false;
  if(to && dateStr > to) return false;
  return true;
}

function toCSV(rows, headers){
  const esc = v => `"${String(v).replace(/"/g,'""')}"`;
  const lines = [headers.map(esc).join(",")];
  rows.forEach(r => lines.push(headers.map(h=>esc(r[h])).join(",")));
  return lines.join("\r\n");
}

function downloadCSV(filename, rows, headers){
  const bom = "﻿";
  const blob = new Blob([bom + toCSV(rows, headers)], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

// ---------- tabs ----------
const tabsEl = document.getElementById("tabs");
const contentEl = document.getElementById("content");
SOURCES.forEach(s => {
  const has = s.key === "overview" || !!DATA[s.key];
  const btn = document.createElement("button");
  btn.className = "tab" + (s.key==="overview" ? " active" : "");
  btn.textContent = s.label;
  btn.disabled = !has;
  btn.onclick = () => selectTab(s.key);
  btn.dataset.key = s.key;
  tabsEl.appendChild(btn);
});

function selectTab(key){
  document.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", b.dataset.key === key));
  document.querySelectorAll(".panel").forEach(p => p.classList.toggle("active", p.id === "panel-" + key));
}

// ---------- overview panel ----------
function buildOverview(){
  const el = document.createElement("div");
  el.id = "panel-overview"; el.className = "panel active";
  const cards = [];
  if (DATA.unei) {
    const t = DATA.unei.daily.reduce((a,d)=>({tier:a.tier+d.tier, aki:a.aki+d.aki}), {tier:0,aki:0});
    cards.push(["2ティア+空き枠 合計（税抜・累計）", t.tier + t.aki, true]);
  }
  if (DATA.adsense) cards.push(["AdSense 前日分合計", DATA.adsense.total, true]);
  if (DATA.kaijudo) {
    const t = DATA.kaijudo.daily.reduce((a,d)=>a+d.sales, 0);
    cards.push(["海獣堂 売上合計（累計）", t, true]);
  }
  if (DATA.rokt) {
    const t = DATA.rokt.daily.reduce((a,d)=>a+(d.Revenue||0), 0);
    cards.push(["Rokt 収益合計（累計）", t, true]);
  }
  el.innerHTML = `<div class="cards">${cards.map(([l,v,key])=>
    `<div class="card ${key?'key':''}"><div class="l">${l}</div><div class="v">${yen(v)}</div></div>`).join("")}</div>
    <div class="note">各タブで期間を絞り込んだ詳細・CSVダウンロードができます。</div>`;
  contentEl.appendChild(el);
}

// ---------- unei panel ----------
function buildUnei(){
  if (!DATA.unei) return;
  const daily = DATA.unei.daily;
  const el = document.createElement("div");
  el.id = "panel-unei"; el.className = "panel";
  const minD = daily[0]?.date, maxD = daily[daily.length-1]?.date;
  el.innerHTML = `
    <div class="toolbar">
      <label>期間 <input type="date" id="unei-from" value="${minD||''}"></label> 〜
      <input type="date" id="unei-to" value="${maxD||''}">
      <button class="btn secondary" id="unei-reset">全期間</button>
      <div class="spacer"></div>
      <button class="btn" id="unei-csv">CSVダウンロード</button>
    </div>
    <div class="cards" id="unei-cards"></div>
    <div class="wrap"><h3>日次推移</h3><div class="chartbox"><canvas id="unei-chart"></canvas></div></div>
    <div class="wrap"><h3>日別明細（引継ぎシート互換）</h3><div class="scroll"><table id="unei-tbl">
    <thead><tr><th>入金日</th><th>合計</th><th>2ティア</th><th>ポータル空き枠</th><th>カテゴリメルマガ</th><th>INDEX購入者ランキング</th><th>インフォトップカレッジ</th><th>営業アフィリ</th><th>その他</th><th>取扱高</th><th>注文件数</th></tr></thead>
    <tbody></tbody><tfoot></tfoot></table></div>
    <div class="note">計上式: 該当ID群の (2ティア報酬／アフィリ報酬) ÷110%。対象IDと区分は 運営課ID定義.csv で管理。ポータル空き枠／INDEX購入者ランキング／インフォトップカレッジ／営業アフィリは該当IDが未登録のため0円表示（IDが判明次第、運営課ID定義.csvの「区分」列に追加可）。参考: 「【21期】ポータル経由アフィリ報酬」シートとは注文日/入金日など集計基準が異なる場合があり、日次の完全一致は保証されません。</div></div>`;
  contentEl.appendChild(el);

  let chart;
  function render(){
    const from = document.getElementById("unei-from").value;
    const to = document.getElementById("unei-to").value;
    const rows = daily.filter(d => within(d.date, from, to));
    let st=0, sa=0, sto=0, sk=0;
    const catTotals = {cat_portal:0, cat_mail:0, cat_index:0, cat_college:0, cat_sales:0, cat_other:0};
    document.querySelector("#unei-tbl tbody").innerHTML = rows.map(d=>{
      st+=d.tier; sa+=d.aki; sto+=d.torihiki; sk+=d.ken;
      Object.keys(catTotals).forEach(k=>catTotals[k]+=(d[k]||0));
      return `<tr><td>${d.date}</td><td>${yen(d.tier+d.aki)}</td><td>${yen(d.tier)}</td><td>${yen(d.cat_portal)}</td><td>${yen(d.cat_mail)}</td><td>${yen(d.cat_index)}</td><td>${yen(d.cat_college)}</td><td>${yen(d.cat_sales)}</td><td>${yen(d.cat_other)}</td><td>${yen(d.torihiki)}</td><td>${d.ken.toLocaleString()}</td></tr>`;
    }).join("") || `<tr><td colspan="11" class="empty">データがありません</td></tr>`;
    document.querySelector("#unei-tbl tfoot").innerHTML = rows.length ? `<tr><td>合計</td><td>${yen(st+sa)}</td><td>${yen(st)}</td><td>${yen(catTotals.cat_portal)}</td><td>${yen(catTotals.cat_mail)}</td><td>${yen(catTotals.cat_index)}</td><td>${yen(catTotals.cat_college)}</td><td>${yen(catTotals.cat_sales)}</td><td>${yen(catTotals.cat_other)}</td><td>${yen(sto)}</td><td>${sk.toLocaleString()}</td></tr>` : "";
    document.getElementById("unei-cards").innerHTML = [
      ["2ティア 計上額（税抜）", st, true], ["空き枠 計上額（税抜）", sa, true], ["合計（税抜）", st+sa, true], ["取扱高（参考）", sto, false],
    ].map(([l,v,key])=>`<div class="card ${key?'key':''}"><div class="l">${l}</div><div class="v">${yen(v)}</div></div>`).join("");
    if (chart) chart.destroy();
    chart = new Chart(document.getElementById("unei-chart"), {type:"line", data:{labels:rows.map(d=>d.date.slice(5)), datasets:[
      {label:"2ティア(税抜)", data:rows.map(d=>d.tier), borderColor:"#1F4E78", backgroundColor:"rgba(31,78,120,.08)", tension:.3, fill:true},
      {label:"空き枠(税抜)", data:rows.map(d=>d.aki), borderColor:"#e8873a", backgroundColor:"rgba(232,135,58,.08)", tension:.3, fill:true},
    ]}, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{position:"bottom"}}, scales:{y:{ticks:{callback:v=>"¥"+v.toLocaleString()}}}}});
  }
  document.getElementById("unei-from").onchange = render;
  document.getElementById("unei-to").onchange = render;
  document.getElementById("unei-reset").onclick = () => { document.getElementById("unei-from").value = minD||''; document.getElementById("unei-to").value = maxD||''; render(); };
  document.getElementById("unei-csv").onclick = () => {
    const from = document.getElementById("unei-from").value, to = document.getElementById("unei-to").value;
    const rows = daily.filter(d => within(d.date, from, to)).map(d => ({
      "日付": d.date, "合計": d.tier+d.aki, "2ティア": d.tier, "ポータル空き枠": d.cat_portal,
      "カテゴリメルマガ": d.cat_mail, "INDEX購入者ランキング": d.cat_index, "インフォトップカレッジ": d.cat_college,
      "営業アフィリ": d.cat_sales, "その他": d.cat_other, "取扱高": d.torihiki, "注文件数": d.ken,
    }));
    downloadCSV(`infotop_${from}_${to}.csv`, rows, ["日付","合計","2ティア","ポータル空き枠","カテゴリメルマガ","INDEX購入者ランキング","インフォトップカレッジ","営業アフィリ","その他","取扱高","注文件数"]);
  };
  render();
}

// ---------- adsense panel ----------
function buildAdsense(){
  if (!DATA.adsense) return;
  const a = DATA.adsense;
  const el = document.createElement("div");
  el.id = "panel-adsense"; el.className = "panel";
  const cards = [
    ["全サイト合計推定収益額" + (a.total_approx ? "（概算）" : ""), a.total, true],
    ["うち english-for-japanese.net", a.english_for_japanese, false],
    ["本日（現時点まで）", a.today, false],
    ["昨日", a.yesterday, false],
    ["今月累計", a.mtd, false],
    ["残高", a.balance, false],
  ].filter(([l,v])=>v!==null && v!==undefined);
  const siteRows = Object.entries(a.sites||{});
  el.innerHTML = `
    <div class="toolbar"><label>対象期間: ${a.period||'-'} ／ 取得: ${a.fetched_at||'-'}</label>
      <div class="spacer"></div>
      <button class="btn" id="adsense-csv">CSVダウンロード</button>
    </div>
    <div class="cards">${cards.map(([l,v,key])=>`<div class="card ${key?'key':''}"><div class="l">${l}</div><div class="v">${yen(v)}</div></div>`).join("")}</div>
    ${siteRows.length ? `<div class="wrap"><h3>サイト別内訳</h3><table><thead><tr><th>サイト</th><th>推定収益額</th></tr></thead><tbody>${siteRows.map(([s,v])=>`<tr><td>${s}</td><td>${yen(v)}</td></tr>`).join("")}</tbody></table></div>` : ""}
    ${a.note ? `<div class="note">${a.note}</div>` : ""}
    <div class="note">AdSenseはメールで届く前日分レポートのため、日次テーブル・グラフは対応していません。</div>`;
  contentEl.appendChild(el);
  document.getElementById("adsense-csv").onclick = () => {
    const rows = siteRows.length ? siteRows.map(([site,amount])=>({period:a.period, site, amount})) : [{period:a.period, total:a.total}];
    downloadCSV("adsense.csv", rows, siteRows.length ? ["period","site","amount"] : ["period","total"]);
  };
}

  if (!DATA.kaijudo) return;
  const daily = DATA.kaijudo.daily;
  const el = document.createElement("div");
  el.id = "panel-kaijudo"; el.className = "panel";
  const minD = daily[0]?.date, maxD = daily[daily.length-1]?.date;
  el.innerHTML = `
    <div class="toolbar">
      <label>期間 <input type="date" id="kj-from" value="${minD||''}"></label> 〜
      <input type="date" id="kj-to" value="${maxD||''}">
      <button class="btn secondary" id="kj-reset">全期間</button>
      <div class="spacer"></div>
      <button class="btn" id="kj-csv">CSVダウンロード</button>
    </div>
    <div class="cards" id="kj-cards"></div>
    <div class="wrap"><h3>日次推移</h3><div class="chartbox"><canvas id="kj-chart"></canvas></div></div>
    <div class="wrap"><h3>日別明細</h3><div class="scroll"><table id="kj-tbl">
    <thead><tr><th>支払い日</th><th>売上(小計)</th><th>受取金額</th><th>注文件数</th></tr></thead>
    <tbody></tbody><tfoot></tfoot></table></div></div>`;
  contentEl.appendChild(el);

  let chart;
  function render(){
    const from = document.getElementById("kj-from").value;
    const to = document.getElementById("kj-to").value;
    const rows = daily.filter(d => within(d.date, from, to));
    let ss=0, sr=0, so=0;
    document.querySelector("#kj-tbl tbody").innerHTML = rows.map(d=>{
      ss+=d.sales; sr+=d.receive; so+=d.orders;
      return `<tr><td>${d.date}</td><td>${yen(d.sales)}</td><td>${yen(d.receive)}</td><td>${d.orders.toLocaleString()}</td></tr>`;
    }).join("") || `<tr><td colspan="4" class="empty">データがありません</td></tr>`;
    document.querySelector("#kj-tbl tfoot").innerHTML = rows.length ? `<tr><td>合計</td><td>${yen(ss)}</td><td>${yen(sr)}</td><td>${so.toLocaleString()}</td></tr>` : "";
    document.getElementById("kj-cards").innerHTML = [
      ["売上合計（小計）", ss, true], ["受取金額合計", sr, true], ["注文件数", so, false],
    ].map(([l,v,key])=>`<div class="card ${key?'key':''}"><div class="l">${l}</div><div class="v">${key||l.includes('件')?'':''}${l.includes('件数')?v.toLocaleString():yen(v)}</div></div>`).join("");
    if (chart) chart.destroy();
    chart = new Chart(document.getElementById("kj-chart"), {type:"line", data:{labels:rows.map(d=>d.date.slice(5)), datasets:[
      {label:"売上(小計)", data:rows.map(d=>d.sales), borderColor:"#8a3b1f", backgroundColor:"rgba(138,59,31,.08)", tension:.3, fill:true},
      {label:"受取金額", data:rows.map(d=>d.receive), borderColor:"#3a8a6b", backgroundColor:"rgba(58,138,107,.08)", tension:.3, fill:true},
    ]}, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{position:"bottom"}}, scales:{y:{ticks:{callback:v=>"¥"+v.toLocaleString()}}}}});
  }
  document.getElementById("kj-from").onchange = render;
  document.getElementById("kj-to").onchange = render;
  document.getElementById("kj-reset").onclick = () => { document.getElementById("kj-from").value = minD||''; document.getElementById("kj-to").value = maxD||''; render(); };
  document.getElementById("kj-csv").onclick = () => {
    const from = document.getElementById("kj-from").value, to = document.getElementById("kj-to").value;
    const rows = daily.filter(d => within(d.date, from, to));
    downloadCSV(`kaijudo_${from}_${to}.csv`, rows, ["date","sales","receive","orders"]);
  };
  render();
}

// ---------- rokt panel ----------
function buildRokt(){
  if (!DATA.rokt) return;
  const daily = DATA.rokt.daily;
  const cols = DATA.rokt.columns;
  const dateCol = DATA.rokt.date_col;
  const revCol = cols.includes("Revenue") ? "Revenue" : cols[1];
  const fmt = v => (v===null||v===undefined) ? "" : (Number.isInteger(v) ? v.toLocaleString() : v.toLocaleString(undefined,{maximumFractionDigits:2}));
  const el = document.createElement("div");
  el.id = "panel-rokt"; el.className = "panel";
  const minD = daily[0]?.[dateCol], maxD = daily[daily.length-1]?.[dateCol];
  el.innerHTML = `
    <div class="toolbar">
      <label>期間 <input type="date" id="rk-from" value="${minD||''}"></label> 〜
      <input type="date" id="rk-to" value="${maxD||''}">
      <button class="btn secondary" id="rk-reset">全期間</button>
      <div class="spacer"></div>
      <button class="btn" id="rk-csv">CSVダウンロード</button>
    </div>
    <div class="cards" id="rk-cards"></div>
    <div class="wrap"><h3>日次推移（収益）</h3><div class="chartbox"><canvas id="rk-chart"></canvas></div></div>
    <div class="wrap"><h3>日別明細</h3><div class="scroll"><table id="rk-tbl">
    <thead><tr>${cols.map(c=>`<th>${c}</th>`).join("")}</tr></thead>
    <tbody></tbody></table></div>
    <div class="note">Roktは水曜日のみ、当月1日〜前日の月次データをまとめて取得しています。直近数日分は次回水曜の取得まで反映されません。</div></div>`;
  contentEl.appendChild(el);
  let chart;
  function render(){
    const from = document.getElementById("rk-from").value;
    const to = document.getElementById("rk-to").value;
    const rows = daily.filter(d => within(d[dateCol], from, to));
    const total = rows.reduce((a,d)=>a+(d[revCol]||0),0);
    document.getElementById("rk-cards").innerHTML = `<div class="card key"><div class="l">Rokt 収益合計</div><div class="v">${yen(total)}</div></div>`;
    document.querySelector("#rk-tbl tbody").innerHTML = rows.map(d=>
      `<tr>${cols.map(c=>`<td>${c===dateCol ? d[c] : fmt(d[c])}</td>`).join("")}</tr>`
    ).join("") || `<tr><td colspan="${cols.length}" class="empty">データがありません</td></tr>`;
    if (chart) chart.destroy();
    chart = new Chart(document.getElementById("rk-chart"), {type:"line", data:{labels:rows.map(d=>d[dateCol].slice(5)), datasets:[
      {label:"収益", data:rows.map(d=>d[revCol]), borderColor:"#7a3ba0", backgroundColor:"rgba(122,59,160,.08)", tension:.3, fill:true},
    ]}, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{position:"bottom"}}, scales:{y:{ticks:{callback:v=>"¥"+v.toLocaleString()}}}}});
  }
  document.getElementById("rk-from").onchange = render;
  document.getElementById("rk-to").onchange = render;
  document.getElementById("rk-reset").onclick = () => { document.getElementById("rk-from").value = minD||''; document.getElementById("rk-to").value = maxD||''; render(); };
  document.getElementById("rk-csv").onclick = () => {
    const from = document.getElementById("rk-from").value, to = document.getElementById("rk-to").value;
    const rows = daily.filter(d => within(d[dateCol], from, to));
    downloadCSV(`rokt_${from}_${to}.csv`, rows, cols);
  };
  render();
}

buildOverview();
buildUnei();
buildAdsense();
buildKaijudo();
buildRokt();
</script></div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
(function(){
  firebase.initializeApp(window.FIREBASE_CONFIG);
  var overlay = document.getElementById("authOverlay");
  var appRoot = document.getElementById("appRoot");
  var logoutBar = document.getElementById("logoutBar");
  var errBox = document.getElementById("authErr");

  firebase.auth().onAuthStateChanged(function(user){
    if(user){
      overlay.style.display = "none";
      appRoot.style.display = "block";
      logoutBar.style.display = "block";
      document.getElementById("authUserLabel").textContent = user.email;
    } else {
      overlay.style.display = "flex";
      appRoot.style.display = "none";
      logoutBar.style.display = "none";
    }
  });

  document.getElementById("authBtn").addEventListener("click", function(){
    errBox.textContent = "";
    var email = document.getElementById("authEmail").value.trim();
    var pass = document.getElementById("authPass").value;
    firebase.auth().signInWithEmailAndPassword(email, pass)
      .catch(function(err){ errBox.textContent = "ログインに失敗しました（" + err.code + "）"; });
  });
  document.getElementById("authPass").addEventListener("keydown", function(e){
    if(e.key === "Enter"){ document.getElementById("authBtn").click(); }
  });
  document.getElementById("logoutBtn").addEventListener("click", function(){
    firebase.auth().signOut();
  });
})();
</script>
</body></html>
